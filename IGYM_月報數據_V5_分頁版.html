<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>IGYM 月報數據</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--orange:#f97316;--orange2:#fb923c;--deep:#9a3412;--bg:#fff7ed;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#fed7aa;--red:#ef4444;--green:#16a34a;--shadow:0 18px 45px rgba(154,52,18,.14)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:radial-gradient(circle at 10% 0,#ffedd5,#fff7ed 32%,#fff);color:var(--text);overflow-x:hidden}
body.dark{--bg:#0f172a;--card:#172033;--text:#f8fafc;--muted:#cbd5e1;--line:#334155;background:#0f172a}
.login{position:fixed;inset:0;z-index:99;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 20% 10%,#fed7aa,#fff7ed 38%,#fff)}
.login-card{width:min(430px,100%);background:rgba(255,255,255,.82);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:34px;padding:34px;box-shadow:var(--shadow);text-align:center}.dark .login-card{background:rgba(15,23,42,.86)}
.logo{width:88px;height:88px;margin:auto;border-radius:26px;background:white;display:grid;place-items:center;font-size:30px;font-weight:950;color:var(--orange);box-shadow:0 12px 30px rgba(249,115,22,.25)}
h1{margin:12px 0 6px;color:var(--deep);font-size:36px}.dark h1{color:#fdba74}.sub{color:var(--muted);font-weight:650}
.pw{display:flex;gap:8px;margin:26px 0 12px;padding:8px;border:1px solid var(--line);border-radius:18px;background:white}.dark .pw{background:#0f172a}.pw input{flex:1;border:0;outline:0;background:transparent;color:var(--text);font-size:18px;padding:12px;min-width:0}
button{font-family:inherit}.btn{border:0;border-radius:15px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;font-weight:900;padding:12px 16px;cursor:pointer;box-shadow:0 12px 24px rgba(249,115,22,.25)}.ghost{border:1px solid var(--line);border-radius:15px;background:var(--card);color:var(--text);font-weight:850;padding:11px 14px;cursor:pointer}
.app{display:none}.side{position:fixed;left:18px;top:18px;bottom:18px;width:250px;background:rgba(255,255,255,.78);backdrop-filter:blur(18px);border:1px solid rgba(249,115,22,.16);border-radius:30px;box-shadow:var(--shadow);padding:18px;z-index:20}.dark .side{background:rgba(23,32,51,.82)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.brand .mini{width:52px;height:52px;border-radius:17px;background:white;display:grid;place-items:center;color:var(--orange);font-weight:950}.brand b{font-size:21px}.brand span{display:block;font-size:12px;color:var(--muted)}
.nav button{width:100%;display:flex;gap:10px;align-items:center;margin:6px 0;padding:13px 14px;border:0;border-radius:16px;background:transparent;color:var(--text);font-weight:800;cursor:pointer;text-align:left}.nav button:hover,.nav button.active{background:#ffedd5;color:#9a3412}.dark .nav button:hover,.dark .nav button.active{background:#431407;color:#fdba74}
.main{margin-left:286px;padding:22px 28px 34px;min-height:100vh}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.actions{display:flex;gap:10px;flex-wrap:wrap}.menu{display:none}
.page{display:none;animation:fade .18s ease}.page.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero{background:linear-gradient(135deg,#fff,#ffedd5);border:1px solid #fed7aa;border-radius:34px;padding:30px;box-shadow:var(--shadow);overflow:hidden;position:relative}.dark .hero{background:linear-gradient(135deg,#172033,#431407)}.hero:after{content:"";position:absolute;right:-60px;top:-60px;width:180px;height:180px;background:rgba(249,115,22,.2);border-radius:50%}.hero h1{font-size:42px;margin:0 0 8px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-top:18px}.card{background:var(--card);border:1px solid rgba(249,115,22,.13);border-radius:26px;box-shadow:var(--shadow);padding:20px}.kpi .label{color:var(--muted);font-weight:850}.kpi .num{font-size:32px;font-weight:950;margin:10px 0}.plus{color:var(--red)!important;font-weight:950}.minus{color:var(--green)!important;font-weight:950}.zero{color:var(--muted)!important;font-weight:950}
.page-title{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:0 0 16px}.page-title h2{font-size:28px;margin:0}.chart-card{height:340px}.compact-chart{height:300px}.table-wrap{overflow:auto;border-radius:20px;border:1px solid var(--line);padding:0;max-height:calc(100vh - 170px)}table{width:100%;border-collapse:collapse;min-width:760px;background:var(--card)}th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}thead th{background:#fff7ed;color:#9a3412;position:sticky;top:0;z-index:1}.dark thead th{background:#431407;color:#fdba74}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}.tab{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;padding:10px 16px;font-weight:950;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border-color:transparent;box-shadow:0 12px 24px rgba(249,115,22,.25)}
.coach-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.drawer{position:fixed;right:22px;top:80px;width:min(420px,calc(100vw - 44px));background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:18px;z-index:30;display:none}.drawer.show{display:block}.trashItem{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}
@media(max-width:900px){.side{transform:translateX(-110%);transition:.25s;left:12px;right:12px;width:auto;bottom:auto}.side.open{transform:translateX(0)}.main{margin-left:0;padding:14px}.menu{display:inline-flex}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.coach-grid{grid-template-columns:1fr}.hero h1{font-size:32px}.table-wrap{max-height:calc(100vh - 210px)}}
@media(max-width:540px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.chart-card,.compact-chart{height:280px}.page-title{align-items:flex-start;flex-direction:column}}
</style></head><body>
<div id="login" class="login"><div class="login-card"><div class="logo">IG</div><h1>IGYM 月報數據</h1><div class="sub">營運分析管理系統</div><div class="pw"><input id="pw" type="password" placeholder="請輸入密碼"><button class="ghost" id="eye">👁</button></div><button class="btn" id="loginBtn" style="width:100%">登入</button><div id="err" style="height:24px;color:#ef4444;font-weight:900;margin-top:10px"></div><div class="sub" style="font-size:12px">© IGYM FITNESS CENTER</div></div></div>
<div id="app" class="app"><aside id="side" class="side"><div class="brand"><div class="mini">IG</div><div><b>IGYM</b><span>月報數據</span></div></div><nav class="nav">
<button class="navBtn active" data-page="dashboard">🏠 Dashboard</button><button class="navBtn" data-page="operation">📊 營運績效</button><button class="navBtn" data-page="effective">👥 有效會員</button><button class="navBtn" data-page="coaches">🏋 教練分析</button><button id="trashBtn">🗑 回收桶</button><button id="logout">🚪 登出</button></nav></aside>
<main class="main"><div class="top"><button id="menu" class="ghost menu">☰ 選單</button><div></div><div class="actions"><button id="theme" class="ghost">🌙 深色模式</button><button id="addMonth" class="ghost">＋ 新增月份</button><button id="delMonth" class="ghost">🗑 刪除最新月份</button></div></div>
<section id="page-dashboard" class="page active"><div class="hero"><h1>IGYM 月報數據</h1><p class="sub">營運分析管理系統｜目前月份：6月｜最後更新：2026/07</p><div id="kpis" class="grid"></div></div><div class="grid" style="grid-template-columns:2fr 1fr;margin-top:18px"><div class="card chart-card"><h2>📈 近 13 個月營收變動趨勢</h2><canvas id="revenueChart"></canvas></div><div class="card"><h2>🟢 經營健康度</h2><div style="font-size:54px;font-weight:950;color:var(--orange);margin:20px 0">87%</div><p class="sub">依單次、訂閱、年約、有效會員、教練業績綜合評估。</p></div></div></section>
<section id="page-operation" class="page"><div class="page-title"><h2>📊 營運績效總攬</h2><span class="sub">1月～6月</span></div><div class="card table-wrap"><table id="operationTable"></table></div></section>
<section id="page-effective" class="page"><div class="page-title"><h2>👥 有效會員分析</h2><span class="sub">訂閱制 / 全時段年約 / 限時段年約</span></div><div class="card table-wrap"><table id="effectiveTable"></table></div></section>
<section id="page-coaches" class="page"><div class="page-title"><h2>🏋 教練分析</h2><span class="sub">每位教練 4 張獨立折線圖</span></div><div id="coachTabs" class="tabs"></div><div class="coach-grid"><div class="card compact-chart"><h2>💰 業績</h2><canvas id="coachRevenue"></canvas></div><div class="card compact-chart"><h2>🏋 操課堂數</h2><canvas id="coachClasses"></canvas></div><div class="card compact-chart"><h2>👤 上課學員數</h2><canvas id="coachStudents"></canvas></div><div class="card compact-chart"><h2>🎯 體驗課人數</h2><canvas id="coachTrials"></canvas></div></div></section>
</main><div id="drawer" class="drawer"><h2>🗑 回收桶</h2><p class="sub">刪除項目會先放這裡，可還原或永久刪除。</p><div id="trashList"></div><button id="closeTrash" class="ghost">關閉</button></div></div>
<script>
const DATA = {"months": ["1月", "2月", "3月", "4月", "5月", "6月"], "kpi": {"單次進場": [1096, 1192, 1630, 1673, 1812, 1497], "訂閱人數": [123, 151, 175, 196, 191, 167], "有效會員": [281, 338, 375, 414, 392, 372], "教練業績": [961200, 836999, 1016400, 832800, 804000, 1004100]}, "operation": [["單次進場人數", "總人數", [1096, 1192, 1630, 1673, 1812, 1497], ""], ["單次進場人數", "總金額", [140500, 148170, 211150, 216210, 234610, 192520], "$"], ["單次進場人數", "100$", [85, 60, 73, 84, 79, 82], "位"], ["單次進場人數", "120$", [655, 853, 990, 1018, 1108, 931], "位"], ["單次進場人數", "150$", [356, 279, 567, 571, 625, 484], "位"], ["訂閱人數", "總人數", [123, 151, 175, 196, 191, 167], ""], ["年約(全時段) 888", "總人數", [25, 31, 34, 33, 19, 23], ""], ["年約(全時段) 888", "A客(新)", [9, 18, 21, 17, 8, 13], ""], ["年約(全時段) 888", "B客(舊)", [16, 13, 13, 16, 11, 10], ""], ["年約(限時段) 788", "總人數", [10, 11, 20, 14, 6, 14], ""], ["年約(限時段) 788", "A客(新)", [3, 6, 12, 9, 4, 7], ""], ["年約(限時段) 788", "B客(舊)", [7, 5, 8, 5, 2, 7], ""], ["教練課程", "總金額", [961200, 836999, 1016400, 832800, 804000, 1004100], "$"], ["教練課程", "體驗課", [5, 7, 10, 6, 9, 5], ""], ["教練課程", "A客(新)", [453600, 187799, 846000, 381600, 291600, 446400], "$"], ["教練課程", "B客(舊)", [507600, 649200, 170400, 451200, 512400, 557700], "$"]], "effective": [["訂閱制", [281, 338, 375, 414, 392, 372]], ["全時段年約", [289, 296, 299, 309, 306, 312]], ["限時段年約", [108, 111, 121, 125, 125, 125]]], "revenue13": {"months": ["六月", "七月", "八月", "九月", "十月", "十一月", "十二月", "一月", "二月", "三月", "四月", "五月", "六月"], "values": [835799, 1094400, 694200, 729600, 868800, 639600, 743200, 961200, 836999, 1016400, 832800, 804000, 1004100]}, "coaches": {"WALLY": {"操課": [77, 51, 90, 88, 81, 75], "業績": [441600, 224997, 166199, 196800, 98999, 231300], "學員": [32, 35, 36, 37, 40, 42], "體驗": [5, 3, 3, 3, 0, 0]}, "TIMMY": {"操課": [102, 62, 105, 101, 110, 81], "業績": [119998, 125399, 118798, 207600, 124800, 93600], "學員": [42, 41, 42, 43, 46, 48], "體驗": [1, 0, 2, 0, 1, 0]}, "NOMI": {"操課": [90, 68, 101, 85, 91, 101], "業績": [62999, 125399, 148199, 62999, 155998, 187200], "學員": [40, 41, 41, 43, 46, 49], "體驗": [1, 1, 3, 1, 2, 2]}, "TIFA": {"操課": [109, 81, 109, 110, 113, 107], "業績": [175799, 156000, 212997, 119399, 164997, 63598], "學員": [52, 53, 52, 53, 54, 55], "體驗": [2, 1, 3, 1, 3, 0]}, "BRYANT": {"操課": [86, 83, 108, 94, 86, 103], "業績": [81600, 130199, 81600, 149399, 145200, 197399], "學員": [40, 42, 44, 46, 48, 50], "體驗": [1, 0, 2, 2, 2, 2]}, "JERRY": {"操課": [96, 75, 100, 118, 108, 105], "業績": [82199, 79198, 275397, 98999, 119397, 98400], "學員": [45, 46, 38, 41, 48, 49], "體驗": [1, 1, 6, 1, 1, 1]}, "HENRY": {"操課": [0, 0, 0, 0, 0, 7], "業績": [0, 0, 0, 0, 0, 135598], "學員": [0, 0, 0, 0, 0, 3], "體驗": [0, 0, 0, 0, 0, 7]}}};
const PASSWORD = "B12345"; let charts={}, selectedCoach=Object.keys(DATA.coaches)[0], trash=JSON.parse(localStorage.getItem("igymTrash")||"[]");
function fmt(v,p="",s=""){v=Number(v||0);return p==="$"?"$"+v.toLocaleString():v.toLocaleString()+s}
function diff(a){return Number(a[a.length-1]||0)-Number(a[a.length-2]||0)} function cls(d){return d>0?"plus":d<0?"minus":"zero"} function dtext(d,p="",s=""){if(d===0)return "-";return (d>0?"+":"-")+(p==="$"?"$":"")+Math.abs(d).toLocaleString()+s}
function showApp(){login.style.display="none";app.style.display="block";renderAll()} if(Date.now()<Number(localStorage.getItem("igymLoginUntil")||0))showApp();
loginBtn.onclick=()=>{if(pw.value.trim()===PASSWORD){localStorage.setItem("igymLoginUntil",Date.now()+7*24*60*60*1000);showApp()}else{err.textContent="密碼錯誤，請重新輸入";document.querySelector(".login-card").animate([{transform:"translateX(0)"},{transform:"translateX(-8px)"},{transform:"translateX(8px)"},{transform:"translateX(0)"}],{duration:240})}}; pw.onkeydown=e=>{if(e.key==="Enter")loginBtn.click()}; eye.onclick=e=>{e.preventDefault();pw.type=pw.type==="password"?"text":"password"}; logout.onclick=()=>{localStorage.removeItem("igymLoginUntil");location.reload()};
function switchPage(p){document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));document.getElementById("page-"+p).classList.add("active");document.querySelectorAll(".navBtn").forEach(b=>b.classList.toggle("active",b.dataset.page===p));side.classList.remove("open");setTimeout(()=>{Object.values(charts).forEach(c=>c.resize&&c.resize())},80)}
document.querySelectorAll(".navBtn").forEach(b=>b.onclick=()=>switchPage(b.dataset.page));
function renderKpis(){kpis.innerHTML="";Object.entries(DATA.kpi).forEach(([n,a])=>{let d=diff(a), money=n.includes("業績");kpis.innerHTML+=`<div class="card kpi"><div class="label">${n}</div><div class="num">${fmt(a.at(-1),money?"$":"")}</div><div class="${cls(d)}">${dtext(d,money?"$":"")}</div></div>`})}
function makeTable(rows,id,cat=true){let h=`<thead><tr>${cat?"<th>類別</th>":""}<th>項目</th>${DATA.months.map(m=>`<th>${m}</th>`).join("")}<th>與上月差異</th></tr></thead>`;let b=rows.map(r=>{let c=cat?r[0]:"",n=cat?r[1]:r[0],a=cat?r[2]:r[1],p=cat?r[3]:"",s=p==="位"?"位":"";let d=diff(a);return `<tr>${cat?`<td>${c}</td>`:""}<td>${n}</td>${a.map(v=>`<td>${fmt(v,p,s)}</td>`).join("")}<td class="${cls(d)}">${dtext(d,p,s)}</td></tr>`}).join("");document.getElementById(id).innerHTML=h+"<tbody>"+b+"</tbody>"}
function chart(id,labels,values,label,money=false){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type:"line",data:{labels,datasets:[{label,data:values,borderColor:"#f97316",backgroundColor:"rgba(249,115,22,.12)",borderWidth:2.5,tension:.35,fill:true,pointRadius:3.5,pointHoverRadius:7}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{left:8,right:8,top:8,bottom:0}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>label+"："+(money?"$":"")+Number(c.raw).toLocaleString()}}},scales:{x:{offset:false,grid:{display:false}},y:{grid:{color:"rgba(148,163,184,.16)"}}}}})}
function renderTabs(){coachTabs.innerHTML="";Object.keys(DATA.coaches).forEach(c=>{let b=document.createElement("button");b.className="tab"+(c===selectedCoach?" active":"");b.textContent=c;b.onclick=()=>{selectedCoach=c;renderTabs();renderCoach()};coachTabs.appendChild(b)})}
function renderCoach(){let c=DATA.coaches[selectedCoach];chart("coachRevenue",DATA.months,c["業績"],selectedCoach+" 業績",true);chart("coachClasses",DATA.months,c["操課"],selectedCoach+" 操課");chart("coachStudents",DATA.months,c["學員"],selectedCoach+" 學員");chart("coachTrials",DATA.months,c["體驗"],selectedCoach+" 體驗")}
function renderTrash(){trashList.innerHTML=trash.length?trash.map((x,i)=>`<div class="trashItem"><div><b>${x.label}</b><div class="sub">${x.type}</div></div><div><button class="ghost" onclick="restoreTrash(${i})">還原</button> <button class="ghost" onclick="deleteForever(${i})">永久刪除</button></div></div>`).join(""):`<p class="sub">目前沒有刪除項目。</p>`}
window.restoreTrash=i=>{trash.splice(i,1);localStorage.setItem("igymTrash",JSON.stringify(trash));renderTrash();alert("已還原（資料同步將在資料管理版完整開放）")}; window.deleteForever=i=>{if(confirm("確定永久刪除？這個動作無法復原。")){trash.splice(i,1);localStorage.setItem("igymTrash",JSON.stringify(trash));renderTrash()}}
trashBtn.onclick=()=>{drawer.classList.add("show");renderTrash()}; closeTrash.onclick=()=>drawer.classList.remove("show"); theme.onclick=()=>document.body.classList.toggle("dark"); menu.onclick=()=>side.classList.toggle("open");
delMonth.onclick=()=>{let m=DATA.months.at(-1); if(confirm(`刪除 ${m}？會先放進回收桶。`)){trash.push({type:"month",label:m+" 月份資料",at:new Date().toISOString()});localStorage.setItem("igymTrash",JSON.stringify(trash));alert("已放入回收桶")}}; addMonth.onclick=()=>alert("新增月份會在 V5 資料管理版開放，避免目前資料不同步。");
function renderAll(){renderKpis();makeTable(DATA.operation,"operationTable",true);makeTable(DATA.effective,"effectiveTable",false);renderTabs();setTimeout(()=>{chart("revenueChart",DATA.revenue13.months,DATA.revenue13.values,"營收",true);renderCoach()},80)}
</script></body></html>
