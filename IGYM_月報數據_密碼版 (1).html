<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IGYM 月報數據</title>
<style>
:root{--blue:#f97316;--orange:#f97316;--orange2:#fb923c;--orange3:#fff7ed;--nav:#241205;--nav2:#3a1b06;--bg:#fff7ed;--text:#1f1308;--line:#fed7aa;--muted:#9a3412;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Arial,'Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.sidebar{background:linear-gradient(180deg,var(--nav),var(--nav2));color:#fff;padding:24px 22px;position:sticky;top:0;height:100vh;z-index:20}.brand{font-size:30px;font-weight:900;letter-spacing:.5px}.brand-sub{font-size:16px;color:#cbd5e1;margin-top:6px}.nav{margin-top:34px;display:flex;flex-direction:column;gap:8px}.nav a{color:#e0f2fe;text-decoration:none;padding:13px 12px;border-radius:12px;font-weight:800;display:flex;align-items:center;gap:10px}.nav a:hover,.nav a.active{background:var(--blue);color:#fff}.sidebar-footer{position:absolute;left:22px;right:22px;bottom:24px;color:#cbd5e1;border-top:1px solid rgba(255,255,255,.12);padding-top:16px;font-size:13px}.menuBtn{display:none;position:fixed;right:14px;bottom:14px;background:#111827;color:white;border:0;border-radius:999px;width:54px;height:54px;font-size:24px;z-index:40;box-shadow:0 12px 25px rgba(0,0,0,.25)}
.main{padding:22px 26px 60px;min-width:0}.page-title{display:flex;align-items:center;gap:12px;margin-bottom:18px}.page-title h1{margin:0;font-size:30px}.logo-bars{color:var(--blue);font-weight:900;font-size:24px}.toolbar{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;box-shadow:0 4px 14px rgba(15,23,42,.04);position:sticky;top:0;z-index:10}.toolbar .spacer{flex:1}.monthChecks{display:flex;gap:13px;flex-wrap:wrap;align-items:center;font-weight:800}.monthChecks label{display:flex;gap:5px;align-items:center}button{border:1px solid #d1d5db;background:#fff;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer;font-size:14px}button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}button.save{background:#10b981;color:#fff;border-color:#10b981}button:hover{filter:brightness(.97)}
.section{scroll-margin-top:88px;margin-top:16px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 24px rgba(15,23,42,.06);padding:18px;margin:14px 0;overflow:auto}.chart-card{padding:18px 18px 12px}.section-title{font-size:26px;margin:0 0 12px}.chart-title{text-align:center;font-size:30px;margin:8px 0 8px}.chartWrap{height:470px;width:100%;min-width:860px}.chartWrap canvas{display:block;width:100%;height:100%}.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px}.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 6px 18px rgba(15,23,42,.04)}.kpi span{color:#334155;font-weight:800}.kpi b{display:block;font-size:25px;margin-top:6px}.pos{color:#dc2626;font-weight:900}.neg{color:#16a34a;font-weight:900}.zero{color:#64748b;font-weight:900}table{border-collapse:collapse;width:100%;min-width:850px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:#fff;z-index:1}th{background:#f8fafc;color:#334155;font-size:13px}input.cell{width:108px;touch-action:manipulation;border:0;background:#fff7cc;text-align:right;font-size:16px;padding:7px;border-radius:6px}input.cell:focus{outline:2px solid #f59e0b}.table-note{padding:12px 8px;color:#334155;font-weight:700}.backTop{position:fixed;right:16px;bottom:84px;display:none;background:#111827;color:#fff;border:0;border-radius:999px;box-shadow:0 10px 20px rgba(0,0,0,.2);z-index:999;width:48px;height:48px;font-size:24px}.coachTabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}.coachTabs button{border-radius:999px}.coachTabs button.active{background:var(--blue);border-color:var(--blue);color:white}.coachLineGrid{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:14px}.lineCard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 6px 18px rgba(15,23,42,.04)}.lineCard h3{margin:0 0 8px;font-size:18px}.lineWrap{height:260px;min-width:300px}.lineWrap canvas{width:100%;height:100%;display:block}

/* Orange dashboard refinement */
body{background:radial-gradient(circle at 20% 0%,#ffedd5 0,#fff7ed 34%,#fffaf5 100%)}
.sidebar{background:linear-gradient(180deg,#2a1203 0%,#451a03 58%,#7c2d12 100%);box-shadow:8px 0 30px rgba(124,45,18,.22)}
.nav a{color:#ffedd5;position:relative;overflow:hidden}.nav a:hover,.nav a.active{background:linear-gradient(135deg,#f97316,#fb923c);box-shadow:0 10px 24px rgba(249,115,22,.28)}
.logo-bars{color:#f97316;text-shadow:0 8px 22px rgba(249,115,22,.25)}
.toolbar{border-color:#fed7aa;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);box-shadow:0 10px 28px rgba(124,45,18,.08)}
button.primary{background:linear-gradient(135deg,#f97316,#fb923c);border-color:#f97316;box-shadow:0 8px 18px rgba(249,115,22,.22)}
button.save{background:linear-gradient(135deg,#ea580c,#f97316);border-color:#ea580c}
.card,.kpi,.lineCard{border-color:#fed7aa;background:rgba(255,255,255,.96);box-shadow:0 12px 32px rgba(124,45,18,.08)}
.kpi{background:linear-gradient(180deg,#fff,#fff7ed)}
.coachTitle{display:flex;align-items:center;gap:12px}.coachBadge{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#f97316,#fdba74);display:grid;place-items:center;color:white;font-size:24px;box-shadow:0 10px 24px rgba(249,115,22,.28)}
.coachTabs button.active{background:linear-gradient(135deg,#f97316,#fb923c);border-color:#f97316;color:white;box-shadow:0 8px 18px rgba(249,115,22,.22)}
.backTop{width:auto;height:46px;padding:0 16px;border-radius:999px;background:linear-gradient(135deg,#f97316,#fb923c);font-size:14px;font-weight:900;letter-spacing:.3px;box-shadow:0 14px 28px rgba(249,115,22,.35);display:none;align-items:center;gap:6px}.backTop::before{content:'↑';font-size:18px}.backTop:hover{transform:translateY(-2px);filter:brightness(1.02)}
input.cell:focus{outline:2px solid #fb923c;box-shadow:0 0 0 4px rgba(251,146,60,.18)}


/* IGYM brand header */
.brandLogo{width:100%;max-width:180px;display:block;margin:0 auto 14px;border-radius:16px;box-shadow:0 14px 34px rgba(0,0,0,.28)}
.brand{font-size:28px;font-weight:950;letter-spacing:.6px;text-align:center;line-height:1.05}
.brand-sub{font-size:18px;color:#ffedd5;margin-top:8px;text-align:center;font-weight:900}
.pageLogo{height:48px;width:auto;border-radius:10px;box-shadow:0 8px 20px rgba(249,115,22,.2);background:#f4510b}
.page-title{gap:14px}
.page-title h1{font-size:32px}
.page-subtitle{font-size:14px;color:#9a3412;font-weight:800;margin-top:4px}
@media(max-width:900px){.brandLogo{max-width:160px}.pageLogo{height:42px}.page-title h1{font-size:25px}}

@media(max-width:900px){.app{display:block}.sidebar{position:fixed;left:-260px;transition:.25s;width:240px}.sidebar.open{left:0}.menuBtn{display:block}.main{padding:16px}.toolbar{position:relative;top:auto}.grid{grid-template-columns:1fr 1fr}.chartWrap{height:380px;min-width:720px}.page-title h1{font-size:24px}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.chart-title{font-size:22px}.section-title{font-size:22px}.chartWrap{height:340px;min-width:680px}.toolbar{align-items:stretch}.toolbar button{width:100%}.monthChecks{font-size:14px}.coachLineGrid{grid-template-columns:1fr}.lineWrap{height:240px;min-width:300px}}
@media print{.sidebar,.toolbar,.menuBtn,.backTop{display:none!important}.app{display:block}.card{box-shadow:none;break-inside:avoid}.main{padding:0}body{background:#fff}}


/* Login gate */
body.locked{overflow:hidden}
body.locked .app{display:none}
.login-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 20% 0%,#fff7ed 0,#ffedd5 38%,#f97316 100%)}
.login-card{width:min(430px,92vw);background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:32px 28px;box-shadow:0 28px 80px rgba(124,45,18,.35);text-align:center;backdrop-filter:blur(16px)}
.login-logo{font-size:34px;font-weight:1000;letter-spacing:.5px;color:#111827;margin-bottom:6px}.login-logo span{color:#f97316}.login-title{font-size:28px;font-weight:1000;margin:0;color:#1f1308}.login-subtitle{margin:8px 0 24px;color:#9a3412;font-weight:800}.login-field{position:relative;margin:10px 0 14px}.login-field input{width:100%;height:54px;border-radius:16px;border:1px solid #fed7aa;background:#fff7ed;padding:0 52px 0 16px;font-size:20px;font-weight:800;outline:none}.login-field input:focus{border-color:#f97316;box-shadow:0 0 0 4px rgba(249,115,22,.16)}.togglePwd{position:absolute;right:10px;top:8px;border:0;background:#fff;border-radius:12px;width:38px;height:38px;font-size:18px;cursor:pointer}.login-btn{width:100%;height:54px;border:0;border-radius:16px;background:linear-gradient(135deg,#f97316,#fb923c);color:white;font-size:18px;font-weight:1000;cursor:pointer;box-shadow:0 14px 30px rgba(249,115,22,.28)}.login-error{min-height:22px;color:#dc2626;font-weight:900;margin-top:12px}.shake{animation:shake .28s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}50%{transform:translateX(7px)}75%{transform:translateX(-5px)}}.logoutBtn{margin-top:10px;width:100%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;border-radius:12px;padding:12px 10px;font-weight:900;cursor:pointer}.logoutBtn:hover{background:#f97316}
body:not(.locked) .login-screen{display:none}

</style>
</head>
<body class="locked">

<div class="login-screen" id="loginScreen">

    <div class="login-subtitle">營運分析管理系統</div>
    <div class="login-field">
      <input id="passwordInput" type="password" placeholder="請輸入密碼" autocomplete="current-password">
      <button class="togglePwd" id="togglePwd" type="button" aria-label="顯示或隱藏密碼">👁️</button>
    </div>
    <button class="login-btn" id="loginBtn" type="button">登入</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

function setupCanvas(canvas){const rect=canvas.getBoundingClientRect();const dpr=Math.max(2,window.devicePixelRatio||1);canvas.width=Math.round(rect.width*dpr);canvas.height=Math.round(rect.height*dpr);const ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);return {ctx,w:rect.width,h:rect.height}}

function drawBar(id,labels,series){let canvas=document.getElementById(id);if(!canvas)return;let {ctx,w,h}=setupCanvas(canvas);ctx.clearRect(0,0,w,h);let vals=series.flatMap(s=>s.values.map(num));let max=Math.max(...vals,1)*1.18;let left=22,right=22,top=56,bottom=92,plotW=w-left-right,plotH=h-top-bottom,base=top+plotH;ctx.lineWidth=1;for(let g=0;g<=4;g++){let y=base-g*plotH/4;ctx.strokeStyle=g===0?'#cbd5e1':'#eef2f7';ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(w-right,y);ctx.stroke()}let groupW=plotW/labels.length;let gap=Math.max(4,groupW*.045);let barW=Math.max(14,Math.min(42,(groupW-gap*2)/series.length-gap));let colors=['#f97316','#fb923c','#fdba74','#9a3412','#ea580c','#facc15'];series.forEach((s,si)=>s.values.forEach((v,i)=>{let val=num(v),bh=val/max*plotH;let gx=left+i*groupW;let x=gx+(groupW-(barW*series.length+gap*(series.length-1)))/2+si*(barW+gap);let y=base-bh;let r=Math.min(6,barW/3);ctx.fillStyle=colors[si%colors.length];roundRect(ctx,x,y,barW,bh,r);ctx.fill();if(val!==0){ctx.fillStyle='#111827';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(chartValue(val),x+barW/2,Math.max(14,y-7))}}));ctx.fillStyle='#111827';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='top';labels.forEach((lab,i)=>ctx.fillText(lab,left+i*groupW+groupW/2,base+14));let itemW=Math.min(160,Math.max(90,plotW/series.length)),total=itemW*series.length,start=left+(plotW-total)/2;ctx.font='bold 14px Arial';ctx.textAlign='left';ctx.textBaseline='middle';series.forEach((s,si)=>{let x=start+si*itemW,y=h-35;ctx.fillStyle=colors[si%colors.length];roundRect(ctx,x,y-8,18,16,4);ctx.fill();ctx.fillStyle='#111827';ctx.fillText(s.name,x+26,y)})}
function roundRect(ctx,x,y,w,h,r){if(h<0){y+=h;h=Math.abs(h)}ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function drawLine(id,labels,values,unit){
  let canvas=document.getElementById(id); if(!canvas)return;
  let {ctx,w,h}=setupCanvas(canvas); ctx.clearRect(0,0,w,h);

<script>
(function(){
